trigger: none

pr:
  branches:
    include:
      - develop
  paths:
    exclude:
      - "GitOps/*" # GitOps 디렉토리 변경은 트리거에서 제외

variables:
  - name: imageTag
    value: "$(Build.BuildId)"
  - group: "Host_Address"
  - group: "Docker"

stages:
  # ====================================
  # 🔧 Continuous Integration (CI) Stage
  # ====================================
  - stage: CI
    displayName: "Continuous Integration"
    jobs:
      - job: BuildTestPush
        displayName: "Build, Test, and Push Docker Image"
        pool:
          name: Default
        steps:
          - script: |
              # 필요한 의존성 설치
              sudo apt-get update
              sudo apt-get install -y build-essential zlib1g-dev libncurses5-dev libgdbm-dev libnss3-dev libssl-dev libreadline-dev libffi-dev libsqlite3-dev wget libbz2-dev

              # Python 3.12.9 소스코드 다운로드 (출시 후 사용 가능)
              wget https://www.python.org/ftp/python/3.12.9/Python-3.12.9.tgz
              tar -xf Python-3.12.9.tgz
              cd Python-3.12.9

              # 컴파일 및 설치
              ./configure --enable-optimizations
              make -j $(nproc)
              sudo make altinstall

              # 버전 확인
              python3.12 --version

              # pip 업그레이드
              python3.12 -m pip install --upgrade pip

              # Poetry 설치
              python3.12 -m pip install poetry

          # Poetry 설치 및 의존성 설치
          - script: |
              curl -sSL https://install.python-poetry.org | python3 -
              export PATH="$HOME/.local/bin:$PATH"
              poetry --version
              poetry config virtualenvs.create false
              poetry install --no-interaction --no-ansi --no-root
            displayName: "Install Poetry and Dependencies"
          # Unit Test 수행 (pytest)
          - script: |
              poetry run pytest app/tests/
            displayName: "Run Unit Tests"

          # Docker 이미지 빌드 및 Docker Hub Push
          - task: Docker@2
            displayName: "Docker Build & Push"
            inputs:
              command: buildAndPush
              repository: $(Docker_ID)/$(Docker_Hub)
              dockerfile: "$(Build.SourcesDirectory)/Dockerfile"
              containerRegistry: "dockerhub-connection"
              tags: |
                $(imageTag)

  # ====================================
  # 🚀 Continuous Deployment (CD) Stage
  # ====================================
  - stage: CD
    displayName: "Continuous Deployment"
    dependsOn: CI
    condition: succeeded()
    jobs:
      - deployment: DeployToServer
        displayName: "Deploy to Remote Server"
        environment: Kubernetes-Platform # Azure DevOps 환경 설정 (선택사항)
        pool:
          name: Default
        strategy:
          runOnce:
            deploy:
              steps:
                # SSH로 서버에 접속하여 배포 수행
                - script: |
                    sudo apt-get install -y sshpass
                    sshpass -p "$(SAM_PW)" ssh -o StrictHostKeyChecking=no user@$(SAM_IP) << EOF
                      echo "$(Docker_Password)" | docker login --username $(Docker_ID) --password-stdin
                      docker pull $(Docker_ID)/$(Docker_Hub):$(imageTag)
                      docker stop fastapi_app || true
                      docker rm fastapi_app || true
                      docker run -d \
                        --name fastapi_app \
                        --env-file .env \
                        -p 80:80 \
                        $(Docker_ID)/$(Docker_Hub):$(imageTag)
                    EOF
                  displayName: "Deploy via SSH"

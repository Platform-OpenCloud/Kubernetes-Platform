apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: elastic-stack-crd
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://github.com/Platform-OpenCloud/Kubernetes-Platform
    path: GitOps/helm-eck/elastic-stack-crds/dev
    targetRevision: develop
  destination:
    server: https://kubernetes.default.svc
    namespace: elastic-stack
  syncPolicy:
    syncOptions:
      - ServerSideApply=true
    automated:
      prune: true
      selfHeal: true

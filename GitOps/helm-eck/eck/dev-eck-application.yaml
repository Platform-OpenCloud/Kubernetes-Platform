apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: eck-operator
  namespace: argocd
spec:
  project: default
  sources:
    - repoURL: https://helm.elastic.co
      chart: eck-operator
      targetRevision: 2.16.1
      helm:
        valueFiles:
          - $values/GitOps/helm-eck/eck/dev-eck.yaml
    - repoURL: https://github.com/Platform-OpenCloud/Kubernetes-Platform
      targetRevision: develop
      ref: values
  destination:
    server: https://kubernetes.default.svc
    namespace: elastic-system
  syncPolicy:
    automated:
      prune: true
      selfHeal: true

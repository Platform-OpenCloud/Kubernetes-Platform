toolbox:
  enabled: true # 디버깅용 Toolbox Pod 활성화 여부
  image: quay.io/ceph/ceph:v19.2.0
  resources:
    limits:
      memory: "500Mi"
    requests:
      cpu: "100m"
      memory: "128Mi"

monitoring:
  # -- Enable Prometheus integration, will also create necessary RBAC rules to allow Operator to create ServiceMonitors.
  # Monitoring requires Prometheus to be pre-installed
  enabled: true
  # -- Whether to disable the metrics reported by Ceph. If false, the prometheus mgr module and Ceph exporter are enabled
  metricsDisabled: false
  # -- Whether to create the Prometheus rules for Ceph alerts
  createPrometheusRules: true
  # -- The namespace in which to create the prometheus rules, if different from the rook cluster namespace.
  # If you have multiple rook-ceph clusters in the same k8s cluster, choose the same namespace (ideally, namespace with prometheus
  # deployed) to set rulesNamespaceOverride for all the clusters. Otherwise, you will get duplicate alerts with multiple alert definitions.
  prometheusRule:
    # -- Labels applied to PrometheusRule
    labels: {}
    # -- Annotations applied to PrometheusRule
    annotations: {}

cephClusterSpec:
  cephVersion:
    # The container image used to launch the Ceph daemon pods (mon, mgr, osd, mds, rgw).
    # v18 is Reef, v19 is Squid
    # RECOMMENDATION: In production, use a specific version tag instead of the general v18 flag, which pulls the latest release and could result in different
    # versions running within the cluster. See tags available at https://hub.docker.com/r/ceph/ceph/tags/.
    # If you want to be more precise, you can always use a timestamp tag such as quay.io/ceph/ceph:v19.2.0-20240927
    image: quay.io/ceph/ceph:v19.2.0
  # The path on the host where configuration files will be persisted. Must be specified. If there are multiple clusters, the directory must be unique for each cluster.
  # Important: if you reinstall the cluster, make sure you delete this directory from each host or else the mons will fail to start on the new cluster.
  dataDirHostPath: /var/lib/rook # Ceph 데이터를 저장할 경로

  mon:
    count: 3 # MON 데몬의 개수 설정
    allowMultiplePerNode: true

  mgr:
   count: 1 # MGR 데몬의 개수 설정

  resources:
    mgr:
      limits:
        memory: "1Gi"
      requests:
        cpu: "200m"
        memory: "512Mi"
    mon:
      limits:
        memory: "2Gi"
      requests:
        cpu: "200m"
        memory: "1Gi"
    osd:
      limits:
        memory: "2Gi"
      requests:
        cpu: "200m"
        memory: "2Gi"
  network:
    provider: host  # 네트워크 모드 (host/calico/cilium)
    
  dashboard:
    enabled: true
    ssl: false

  monitoring:
    enabled: true
    metricsDisabled: false

  placement:
    mon:
      nodeAffinity:
        requiredDuringSchedulingIgnoredDuringExecution:
          nodeSelectorTerms:
            - matchExpressions:
                - key: worker-ceph-cluster
                  operator: In
                  values:
                    - "true"
    osd:
      nodeAffinity:
        requiredDuringSchedulingIgnoredDuringExecution:
          nodeSelectorTerms:
            - matchExpressions:
                - key: worker-ceph-cluster
                  operator: In
                  values:
                    - "true"

  storage:   
    useAllNodes: false
    useAllDevices: true
    nodes:
      - name: project-worker-1
        devices:
          - name: "vdb"
      - name: project-worker-2
        devices:
          - name: "vdb"
      - name: project-worker-3
        devices:
          - name: "vdb"


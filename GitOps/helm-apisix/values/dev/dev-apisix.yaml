image:
  # -- Apache APISIX image repository
  repository: apache/apisix
  # -- Apache APISIX image pull policy
  pullPolicy: IfNotPresent
  # -- Apache APISIX image tag
  tag: 3.11.0-debian

replicaCount: 3
resources:
  limits:
    cpu: 500m
    memory: 512Mi
  requests:
    cpu: 250m
    memory: 256Mi

timezone: "Asia/Seoul"

metrics:
  serviceMonitor:
    enabled: true
    # -- namespace where the serviceMonitor is deployed, by default, it is the same as the namespace of the apisix
    namespace: "ingress-apisix"

apisix:
  deployment:
    mode: traditional # etcd 없이 standalone 모드 사용 (또는 필요 시 traditional 모드로 전환)
    role: traditional

  admin:
    enabled: true
    ip: 0.0.0.0
    # -- which port to use for Apache APISIX admin API
    port: 9180
    # -- Service port to use for Apache APISIX admin API
    servicePort: 9180
    cors: false
    credentials:
      # -- Apache APISIX admin API admin role credentials
      admin: edd1c9f034335f136f87ad84b625c8f1
      # -- Apache APISIX admin API viewer role credentials
      viewer: 4054f7cf07e344346cd3f287985e76a2

    allow:
      # -- The client IP CIDR allowed to access Apache APISIX Admin API service.
      ipList:
        - 0.0.0.0/0
    ingress:
      enabled: false
      hosts:
        - host: apisix-admin.ingress-apisix.svc.cluster.local
          paths:
            - /apisix

service:
  type: LoadBalancer # 클라우드 환경 등 외부 로드밸런서 사용
  http:
    servicePort: 80
    containerPort: 9080
  tls:
    servicePort: 443

etcd:
  enabled: true
  replicaCount: 1 # 클러스터 노드 수에 맞춰 조정
  persistence:
    storageClass: "longhorn" # Longhorn StorageClass 사용
    size: 10Gi

dashboard:
  enabled: false
  config:
    conf:
      etcd:
        # -- Supports defining multiple etcd host addresses for an etcd cluster
        endpoints:
          - apisix-etcd:2379
        # -- apisix configurations prefix
        prefix: "/apisix"
        # -- Specifies etcd basic auth username if enable etcd auth
        username: admin
        # -- Specifies etcd basic auth password if enable etcd auth
        password: ~

ingress-controller:
  enabled: false
  config:
    apisix:
      adminAPIVersion: "v3"

replicaCount: 3
resources:
  limits:
    cpu: 500m
    memory: 512Mi
  requests:
    cpu: 250m
    memory: 256Mi
autoscaling:
  enabled: true
  version: v2
  minReplicas: 3
  maxReplicas: 10
  targetCPUUtilizationPercentage: 60

apisix:
  deployment:
    mode: standalone       # etcd 없이 standalone 모드 사용 (또는 필요 시 traditional 모드로 전환)
  admin:
    enabled: true
    ingress:
      enabled: true
      hosts:
        - host: apisix-admin.example.com
          paths:
            - "/apisix"
    cors: true

service:
  type: LoadBalancer       # 클라우드 환경 등 외부 로드밸런서 사용
  http:
    servicePort: 80
    containerPort: 9080
  tls:
    servicePort: 443

ingress:
  enabled: true
  hosts:
    - host: apisix.example.com
      paths:
        - "/"
  tls:
    - hosts:
        - apisix.example.com
      secretName: apisix-tls

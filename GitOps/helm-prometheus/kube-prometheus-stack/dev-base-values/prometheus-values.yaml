prometheus:
  prometheusSpec:
    webSpec:
      tlsConfig:
        insecureSkipVerify: true

    # false로 설정하면, Helm 차트에 정의된 release라벨을 기준으로 ServiceMonitor를 필터링하지 않습니다.
    # 모든 ServiceMonitor 리소스를 기본적으로 선택 대상으로 포함합니다.
    serviceMonitorSelectorNilUsesHelmValues: false
    serviceMonitorNamespaceSelector: {}
    # Prometheus 저장소 설정
    storageSpec:
      volumeClaimTemplate:
        spec:
          storageClassName: "longhorn"
          accessModes:
            - ReadWriteOnce
          resources:
            requests:
              storage: 20Gi # 필요에 따라 크기 조정

  service:
    type: NodePort
    nodePort: 30090

prometheusOperator:
  admissionWebhooks:
    failurePolicy: Ignore
  tls:
    enabled: false
